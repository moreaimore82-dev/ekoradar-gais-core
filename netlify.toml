[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/system-info"
  to = "/.netlify/functions/system-info"
  status = 200

[[redirects]]
  from = "/api/market-data"
  to = "/.netlify/functions/market-data"
  status = 200

[[redirects]]
  from = "/api/scrape"
  to = "/.netlify/functions/scrape"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
